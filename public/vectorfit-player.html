<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VectorFit Player</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, rgba(213, 255, 95, 0.08), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
        font-family: system-ui, sans-serif;
        color: #d0d0d4;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #animation {
        position: absolute;
        inset: 0;
      }

      .status {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="animation"></div>
      <div id="status" class="status">Loading movement preview...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search)
      const src = params.get('src')
      const speed = Number(params.get('speed') || 0.9)
      const status = document.getElementById('status')
      const animationContainer = document.getElementById('animation')

      async function boot() {
        if (!src) {
          status.textContent = 'Missing animation source.'
          return
        }

        try {
          const response = await fetch(src)
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`)
          }

          const animationData = await response.json()
          status.remove()
          const animation = window.lottie.loadAnimation({
            container: animationContainer,
            renderer: 'svg',
            loop: true,
            autoplay: true,
            animationData,
            rendererSettings: {
              preserveAspectRatio: 'xMidYMid meet',
            },
          })
          animation.setSpeed(speed)
        } catch (error) {
          console.error('VectorFit iframe player failed', error)
          status.textContent = 'Could not render this movement preview.'
        }
      }

      boot()
    </script>
  </body>
</html>
